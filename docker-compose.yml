services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mmorpg
      POSTGRES_USER: mmorpg
      POSTGRES_PASSWORD: mmorpg
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmorpg"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
